<!DOCTYPE html>
<html>

<head>

    <title>Food Donation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        a {
            text-decoration: none;
        }

        .form-body {
            background: linear-gradient(
                to right,
                #dfe9f3,
                #ffffff
            );
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .btn {
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 25px;
            background-color: #198754;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #146c43;
        }
    </style>

</head>

<body class="form-body">

    <div class="container">

        <h1 class="mt-5">
            Food Donation System
        </h1>

        <p>
            Help people by donating food
        </p>

        <a href="/login-page"
        class="btn btn-primary">
            Login
        </a>

        <a href="/register-page"
        class="btn btn-success">
            Register
        </a>

        <br><br>

        <a href="/foods-page"
        class="btn btn-warning">
            View Foods
        </a>

    </div>

</body>

</html>

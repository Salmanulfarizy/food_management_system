<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ===================== FORM BODY ===================== */
        .form-body {
            background: linear-gradient(135deg, #dfe9f3 0%, #ffffff 50%, #f0f7ff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .form-body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(25, 135, 84, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        /* ===================== FORM CONTAINER ===================== */
        .container {
            background-color: white;
            width: 100%;
            max-width: 450px;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid rgba(25, 135, 84, 0.1);
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container h1 {
            color: #198754;
            margin-bottom: 10px;
            font-size: 42px;
            font-weight: 700;
        }

        .container p {
            color: #666;
            font-size: 16px;
            margin-bottom: 35px;
            line-height: 1.6;
            font-weight: 500;
        }

        /* ===================== FORM INPUTS ===================== */
        input {
            width: 100%;
            padding: 12px 14px;
            margin-top: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: clamp(14px, 2vw, 16px);
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            min-height: 44px;
        }

        input::placeholder {
            color: #999;
            font-weight: 500;
        }

        input:focus {
            border-color: #198754;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(25,135,84,0.1);
            transform: translateY(-2px);
        }

        br {
            display: none;
        }

        /* ===================== BUTTONS ===================== */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #198754;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: clamp(14px, 2vw, 16px);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            min-height: 44px;
            touch-action: manipulation;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            background-color: #146c43;
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(25, 135, 84, 0.4);
        }

        button:active {
            transform: translateY(-1px);
        }

        /* ===================== ACTION LINKS ===================== */
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 20px;
            font-size: 15px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
            text-align: center;
            width: calc(100% - 40px);
        }

        .btn-success {
            background-color: #198754;
            color: white;
            border-color: #198754;
        }

        .btn-success:hover {
            background-color: #146c43;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(25, 135, 84, 0.3);
        }

        .btn-primary {
            background-color: #0d6efd;
            color: white;
            border-color: #0d6efd;
        }

        .btn-primary:hover {
            background-color: #0b5ed7;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(13, 110, 253, 0.3);
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
            border-color: #6c757d;
        }

        .btn-secondary:hover {
            background-color: #5a6268;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(108, 117, 125, 0.3);
        }

        /* ===================== RESPONSIVE ===================== */
        @media (max-width: 768px) {
            .container {
                padding: 30px 24px;
                max-width: 100%;
                border-radius: 10px;
            }

            .container h1 {
                font-size: 32px;
            }

            input {
                padding: 11px 12px;
                font-size: 14px;
                margin-top: 10px;
                min-height: 42px;
            }

            button {
                padding: 11px;
                font-size: 14px;
                margin-top: 15px;
                min-height: 42px;
            }

            .btn {
                width: calc(100% - 32px);
                padding: 10px 14px;
                font-size: 13px;
                margin-top: 10px;
                min-height: 40px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px 18px;
                max-width: 100%;
                border-radius: 8px;
            }

            .container h1 {
                font-size: 26px;
            }

            input {
                padding: 10px 10px;
                font-size: 13px;
                margin-top: 8px;
                min-height: 40px;
            }

            button {
                padding: 10px;
                font-size: 13px;
                margin-top: 12px;
                min-height: 40px;
            }

            .btn {
                width: calc(100% - 24px);
                padding: 9px 12px;
                font-size: 12px;
                margin-top: 7px;
                min-height: 38px;
            }
        }
    </style>

</head>

<body class="form-body">

    <div class="container">

        <h1 class="mt-3">
            Create Account
        </h1>

        <p>
            Register to donate and receive food
        </p>

        <form action="/register" method="post">

            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required
            >

            <br>

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >

            <br>

            <button type="submit">
                Register
            </button>

        </form>

        <br>

        <a href="/login-page"
        class="btn btn-primary">

            Already have an account? Login

        </a>

        <br><br>

        <a href="/"
        class="btn btn-secondary">

            Back Home

        </a>

    </div>

</body>

</html>

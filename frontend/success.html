<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        a {
            text-decoration: none;
        }

        .success-container {
            background: linear-gradient(to right, #dfe9f3, #ffffff);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .success-box {
            background-color: white;
            width: 450px;
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .success-icon {
            font-size: 60px;
            color: #198754;
            margin-bottom: 20px;
        }
        
        .success-box h1 {
            color: #198754;
            font-size: 32px;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .success-box p {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .redirect-info {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            color: #555;
            font-size: 14px;
        }
        
        .btn-success-redirect {
            width: 100%;
            padding: 14px;
            background-color: #198754;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-success-redirect:hover {
            background-color: #146c43;
            color: white;
            text-decoration: none;
        }
        
        .timer {
            font-size: 14px;
            color: #198754;
            font-weight: 600;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-box">
            <div class="success-icon">✓</div>
            <h1>Registration Successful</h1>
            <p>Your account has been created successfully. You can now log in with your credentials.</p>
            
            <div class="redirect-info">
                You will be redirected to the login page in <span id="countdown">3</span> seconds...
            </div>
            
            <a href="/login-page" class="btn-success-redirect">Go to Login</a>
            <div class="timer">Redirecting in <span id="timer">3</span>s</div>
        </div>
    </div>

    <script>
        let count = 3;
        
        // Update countdown
        const countdownInterval = setInterval(() => {
            count--;
            document.getElementById('countdown').textContent = count;
            document.getElementById('timer').textContent = count;
            
            if (count <= 0) {
                clearInterval(countdownInterval);
                window.location.href = '/login-page';
            }
        }, 1000);
    </script>
</body>
</html>
